name: 手动构建并提交到 build-dist 分支

# 仅手动触发（点一下才构建）
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 设置 Node.js 23.11.0
        uses: actions/setup-node@v4
        with:
          node-version: 23.11.0
          cache: "npm"

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 打包项目
        run: npm run build

      # 创建部署目录并复制整个 dist 文件夹
      - name: 准备部署目录
        run: |
          mkdir -p deploy
          cp -r dist deploy/

      # 创建 .gitignore 文件
      - name: 创建 .gitignore 文件
        run: |
          cat > deploy/.gitignore << 'EOF'
          # Logs
          logs
          *.log
          npm-debug.log*
          yarn-debug.log*
          yarn-error.log*
          pnpm-debug.log*
          lerna-debug.log*

          node_modules
          .DS_Store
          *.local

          # Editor directories and files
          .idea
          *.suo
          *.ntvs*
          *.njsproj
          *.sln
          *.sw?
          EOF

      # 👇 核心：把打包产物提交到 build-dist 分支
      - name: 部署到 build-dist 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: build-dist   # 目标分支
          folder: deploy       # 使用包含 dist 文件夹的 deploy 目录作为部署目录
          clean: true          # 清空旧文件