version: '1.0'
name: 手动构建并提交到 build-dist 分支

# 触发方式：仅手动触发
trigger:
  push:
    branches:
      - ignore  # 不自动触发
  manual: true  # 开启手动触发

# 构建环境
job:
  name: build
  runs-on: ubuntu-latest

  steps:
    # 1. 拉取代码
    - name: 拉取代码
      uses: actions/checkout@v4

    # 2. 设置 Node 23.11.0
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 23.11.0

    # 3. 安装依赖
    - name: 安装依赖
      run: npm install --legacy-peer-deps

    # 4. 打包
    - name: 执行打包
      run: npm run build

    # 5. 推送到 build-dist 分支（核心）
    - name: 推送 dist 到 build-dist 分支
      run: |
        git config --global user.name "gitee-ci"
        git config --global user.email "ci@gitee.com"
        
        cd dist
        git init
        git add .
        git commit -m "Gitee Go 自动构建：$(date +'%Y-%m-%d %H:%M:%S')"
        
        git push -f "https://${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git" HEAD:build-dist
      env:
        GITEE_TOKEN: ${GITEE_TOKEN}
        GITEE_REPO: ${GITEE_REPO}